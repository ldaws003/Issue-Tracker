<!DOCTYPE html>
<html>
  <head>
    <title>Issue Tracker</title>
    <meta name="description" content="A nodejs/expressjs project to track issues">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/public/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body class="bg-light.bg-gradient">
    <header class="text-center">
      <h1 id="projectTitle" class="mt-5"></h1>
    </header>
    <div class="w-50 mx-auto" style="min-width: 450px;">
      <div id="submitNewIssue">
        <br>
        <h3>Submit a new issue:</h3>
        <form id="newIssue" method="post" action="/api/" class="w-25 mb-3" style="min-width: 360px">
        <div class="mb-2">
          <label for="issue-title" class="form-label">Title: </label>
          <input id="issue-title" type="text" name="issue_title" placeholder="*Title" class="form-control" required>
        </div>
        <div class="mb-2">
          <label for="issue-text" class="form-label">Issue Description: </label>
          <textarea id="issue-text" type="text" name="issue_text" placeholder="*Description" class="form-control" required></textarea>
        </div>
        <div class="mb-2">
          <label for="created-by" class="form-label">Created By: </label>
          <input id="created-by" class="form-control" type="text" name="created_by" placeholder="*Created by" required>
        </div>
        <div class="mb-2">
          <label for="assigned-to" class="form-label">Assigned to (optional): </label>
          <input id="assigned-to" class="form-control" type="text" name="assigned_to" placeholder="Assigned to" >
        </div>
        <div class="mb-2">
          <label for="status-text" class="form-label">Status Text (optional): </label>
          <input id="status-text" class="form-control" type="text" name="status_text" placeholder="Status text" >
        </div>
        <button class="btn btn-primary" type="submit">Submit Issue</button>
      </div>
      
      <div id="issueDisplay"></div>
      
      <hr style="margin: 50px; margin-top: 200px">
    </div>
    <script type="module" src="../scripts/project-issues.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
