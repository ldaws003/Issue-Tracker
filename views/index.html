<!DOCTYPE html>
<html>
  <head>
    <title>Issue Tracker</title>
    <meta name="description" content="A cool thing made with HyperDev">
    <link id="favicon" rel="icon" href="https://hyperdev.com/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body class="bg-light.bg-gradient">
    <header class="text-center">
      <h1 class="mt-5">
        Issue Tracker
      </h1>
    </header>
    <hr style="margin: 50px">
    <div id="testui" class="px-3">
      <h2 style="text-align: left">API Tests:</h2>
      <h3>Submit issue on <i>apitest</i></h3>
      <form id="testForm" class="w-25 mb-5" style="min-width: 420px">
        <div class="mb-3">
          <label for="test-form-issue-title" class="form-label">Title: </label>
          <input id="test-form-issue-title" type="text" name="issue_title" placeholder="*Title" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="test-form-issue-text" class="form-label">Issue Description: </label>
          <textarea id="test-form-issue-text" type="text" name="issue_text" placeholder="*Description" class="form-control" required></textarea>
        </div>
        <div class="mb-3">
          <label for="test-created-by" class="form-label">Created By: </label>
          <input id="test-created-by" class="form-control" type="text" name="created_by" placeholder="*Created by" required>
        </div>
        <div class="mb-3">
          <label for="test-assigned-to" class="form-label">Assigned to (optional): </label>
          <input id="test-assigned-to" class="form-control" type="text" name="assigned_to" placeholder="Assigned to" >
        </div>
        <div class="mb-3">
          <label for="test-status-text" class="form-label">Status Text (optional): </label>
          <input id="test-status-text" class="form-control" type="text" name="status_text" placeholder="Status text" >
        </div>
        <button class="btn btn-primary" type="submit">Submit Issue</button>
      </form>

      <h3>Update issue on <i>apitest</i> (Change any or all to update issue on the _id supplied)</h3>
      <form id="testForm2" class="w-25 mb-5" style="min-width: 420px">
        <div class="mb-3">
          <label for="test-form2-issue-ID" class="form-label">ID: </label>
          <input id="test-form2-issue-ID" class="form-control" type="text" name="_id" placeholder="*id" required>
        </div>
        <div class="mb-3">
          <label for="test-form2-issue-title" class="form-label">Title (optional): </label>
          <input id="test-form2-issue-title" class="form-control" type="text" name="issue_title" placeholder="Title" >
        </div>
        <div class="mb-3">
          <label for="test-form2-issue-text" class="form-label">Issue Description (optional): </label>
          <textarea id="test-form2-issue-text" class="form-control" type="text" name="issue_text" placeholder="Text" ></textarea>
        </div>
         <div class="mb-3">
          <label for="test-form2-issue-createdby" class="form-label">Created By (optional): </label>
          <input id="test-form2-issue-createdby" type="text" name="created_by" class="form-control" placeholder="Created by" >
        </div>
         <div class="mb-3">
          <label for="test-form2-issue-assigned" class="form-label">Assigned to (optional): </label>
          <input id="test-form2-issue-assigned" type="text" name="assigned_to" class="form-control" placeholder="Assigned to" >
        </div>
         <div class="mb-3">
          <label for="test-form2-issue-text" class="form-label">Status (optional): </label>
          <input id="test-form2-issue-text" type="text" name="status_text" class="form-control" placeholder="Status text" >
        </div>
        <div class="mb-3 form-check">
          <label for="test-form2-issue-closed" class="form-check-label">Check to close issue</label>
          <input id="test-form2-issue-closed" class="form-check-input" type="checkbox" name="open" value="false"> 
        </div>
        <button class="btn btn-primary" type="submit">Submit Issue</button>
      </form>

      <h3>Delete issue on <i>apitest</i></h3>
      <form id="testForm3" class="w-25 mb-5" style="min-width: 420px">
        <div class="mb-3">
          <label for="test-form3-id" class="form-label">ID of issue to be deleted: </label>
          <input id="test-form3-id" class="form-control" type="text" name="_id" placeholder="_id" required>
        </div>
        <button class="btn btn-danger" type="submit">Delete Issue</button>
      </form>
      <code id="jsonResult"></code>
    </div>

    <div class="mt-1">
      <h2 class="text-center">
        <a href="/apitest/">EXAMPLE: Go to Apitest project issues</a>
      </h2>
    </div>

    <div class="mt-5">
      <hr>
    </div>
    <script type="module" src="./scripts/home-script.js" ></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
